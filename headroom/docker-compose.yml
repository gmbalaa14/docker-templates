name: headroom

services:
  headroom:
    build: .
    container_name: headroom_proxy
    restart: unless-stopped
    ports:
      - "${HEADROOM_BIND_HOST:-127.0.0.1}:${HEADROOM_PORT:-8787}:8787"
    environment:
      - HEADROOM_TELEMETRY=off
      - HEADROOM_CODE_AWARE_ENABLED=${HEADROOM_CODE_AWARE_ENABLED:-1}
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Asia/Kolkata}
    volumes:
      - headroom_data:/root/.headroom
    command: >
      sh -c 'headroom proxy --port 8787 --host 0.0.0.0 --no-telemetry --memory
      $$([ "$$HEADROOM_CODE_AWARE_ENABLED" = "1" ] && echo "--code-aware")'

volumes:
  headroom_data:

# ── Nginx Proxy Manager integration (optional) ─────────────────────────
# Requires proxy-net to exist: docker network create proxy-net
# Uncomment to allow NPM to reverse-proxy this service.
# networks:
#   default:
#   proxy-net:
#     external: true
#     name: proxy-net
