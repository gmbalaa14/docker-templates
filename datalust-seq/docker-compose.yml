name: datalust-seq

networks:
  default:

volumes:
  seq_data:

services:
  seq:
    image: datalust/seq:2024.3
    container_name: seq
    hostname: seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: "${SEQ_ADMIN_PASSWORD_HASH}"
      DATA_DIR: /data
      TZ: Etc/UTC
    volumes:
      - seq_data:/data
    ports:
      - "${SEQ_INGEST_PORT:-5341}:5341"
      - "${SEQ_UI_PORT:-8090}:80"
    restart: unless-stopped

# ── Nginx Proxy Manager integration (optional) ─────────────────────────
# Requires proxy-net to exist: docker network create proxy-net
# Uncomment to allow NPM to reverse-proxy this service.
# networks:
#   default:
#   proxy-net:
#     external: true
#     name: proxy-net
