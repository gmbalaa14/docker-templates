name: kafka-ui

networks:
  kafka-ui-net:
    external: true
    name: kafka-ui-net

volumes:
  kafka_ui_config:

services:
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
    volumes:
      - kafka_ui_config:/etc/kafkaui
    networks:
      - kafka-ui-net
    restart: unless-stopped
