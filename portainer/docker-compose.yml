name: portainer

networks:
  default:

volumes:
  portainer_data:

services:
  portainer:
    image: portainer/portainer-ce:2.21.4
    container_name: portainer
    restart: unless-stopped
    command: --admin-password '${PORTAINER_ADMIN_PASSWORD_HASH}'
    ports:
      - "${PORTAINER_HTTPS_PORT:-9443}:9443"
      - "${PORTAINER_TUNNEL_PORT:-8000}:8000"
    volumes:
      - portainer_data:/data
      # WARNING: Docker socket grants container access to the Docker daemon (root-equivalent on host).
      # Required for Portainer to manage Docker resources.
      - /var/run/docker.sock:/var/run/docker.sock

# ── Nginx Proxy Manager integration (optional) ─────────────────────────
# Requires proxy-net to exist: docker network create proxy-net
# Uncomment to allow NPM to reverse-proxy this service.
# networks:
#   default:
#   proxy-net:
#     external: true
#     name: proxy-net
